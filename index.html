    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
    
    <style>
      /* Fallback/Loader Styles before React Hydrates */
      body {
        margin: 0;
        background-color: #0A0A0F;
        color: #E2E8F0;
        font-family: 'Inter', sans-serif;
      }
      .initial-loader {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        width: 100vw;
        position: fixed;
        top: 0;
        left: 0;
        background-color: #0A0A0F;
        z-index: 9999;
        transition: opacity 0.5s ease-out;
      }
      .loader-logo {
        font-family: 'JetBrains Mono', monospace;
        font-size: 2rem;
        color: #A78BFA;
        margin-bottom: 20px;
        letter-spacing: -1px;
      }
      .loader-bar {
        width: 120px;
        height: 3px;
        background-color: #2D2D4A;
        border-radius: 3px;
        position: relative;
        overflow: hidden;
      }
      .loader-progress {
        width: 40%;
        height: 100%;
        background: linear-gradient(90deg, #7C3AED, #A78BFA);
        position: absolute;
        animation: loading-slide 1.5s infinite ease-in-out;
        border-radius: 3px;
      }
      @keyframes loading-slide {
        0% { left: -40%; }
        100% { left: 100%; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Loading placeholder until React loads -->
      <div class="initial-loader" id="pre-loader">
        <div class="loader-logo">Chronix</div>
        <div class="loader-bar">
          <div class="loader-progress"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
